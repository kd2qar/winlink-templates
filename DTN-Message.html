function wordcount(s) {
    s = s.trim();  
    s = s.replace(/(^\s*)|(\s*$)/gi,"");//exclude start and end white-space  
    s = s.replace(/\n/g, " "); // Convert CR to spacing  
    s = s.replace(/[ ]{2,}/gi," ");//2 or more space to 1  
    var cnt = s.split(' ').length;
    strhasnothing= s.length;  
    if (strhasnothing == 0 ){cnt = 0; }
    let arl = '';  
    var thewordcnt = cnt; 
    let elem = document.getElementById('WarningText');  
    elem.style.background = '#FFFFFF';  
    document.getElementById('WarningText').innerHTML = " ";    
    if (cnt > 25) {// alert ("at 25 words"); #FFFF00  
    // Stop you have reached 30 words  
    elem.style.background = '#FFFFFF';  
    document.getElementById('WarningText').innerHTML = " ";  
    if (cnt >25 ){  
        elem.style.background = '#ffffcc';  
        document.getElementById('WarningText').innerHTML = "You have entered more than 25 groups.";  
        }  
    if (cnt >= 30){  
        elem.style.background = '#ffcccc';  
        document.getElementById('WarningText').innerHTML = "You have entered "+cnt+ " groups.";  
        }
    }
    //arl
    let narl = s.search(/ARL /i);  
    let marl = s.search(/ ARL /i);  
    // need to check that one less than n is not a letter --/  
    if (narl==0 && arl == '') {arl = "ARL "}; 
    if (marl>1 && arl == '') {arl = "ARL "};  
    // TEST FOR BOTH
    let ele = document.getElementById('check');  
    ele.value = arl+cnt;  
    let ele2 = document.getElementById('check2');  
    ele2.value = arl+cnt;  
    }

function fixpunct(MSGText, fieldid) {  
    n = MSGText;  
    n = n.replace(/(\d)\.(\d)/gm,'$1'+"R"+'$2' );  
    n = n.replace(/(\r\n|\n|\r)/gm," ");  
    n = n.replace(/(\D)\.(\S)/gm,'$1'+" dot "+'$2');  
    n = n.replace(/(\D)\.\s/gm,'$1'+" X ");	  
    n=n.replace(/\,/gm, "");  
    n=n.replace(/\-/gm, " DASH ");         
    //test
    n = n.replace(/DASH (\d)/gm,"M"+'$1' );  
    // end test
    n=n.replace(/\?/gm, " QUERY ");  
    n=n.replace(/\!/gm, "");  
    n=n.replace(/\:/gm, "");  
    n=n.replace(/\@/gm, " ATSIGN ");  
    n=n.replace(/\"/gm, "");  
    n=n.replace(/\\/gm, " BACKSLASH ");  
    n=n.replace(/\+/gm, "");  
    n=n.replace(/\;/gm, "");  
    n=n.replace(/\~/gm, "");  
    n=n.replace(/\_/gm, " UNDERSCORE ");  
    n=n.replace(/\'/gm, "");  
    n=n.replace(/\#/gm, "");  
    n=n.replace(/\%/gm, "");  
    n=n.replace(/\(/gm, "");  
    n=n.replace(/\)/gm, "");  
    n=n.replace(/\&/gm, "");  
    n=n.replace(/\*/gm, "");  
    n=n.replace(/\>/gm, " ");  
    n=n.replace(/\</gm, "");

    n=n.replace(/\{/gm, "");  
    n=n.replace(/\}/gm, "");  
    n=n.replace(/\[/gm, "");  
    n=n.replace(/\]/gm, "");  
    n=n.replace(/\\/gm, "");  
    n=n.replace(/\`/gm, "");  
    n=n.replace(/\|/gm, "");  
    n=n.replace(/\=/gm, "");  
    n=n.replace(/\ /gm, " ");  
    n = n.replace(/\s+/g, ' ');   
    document.getElementById(fieldid).value = n;  
    return(n);  
    }

<h1><font color='maroon' >Digital Traffic Network Message</font></h1>
<form class="form-container" id='dtnform' method='post' action='http://{FormServer}:{FormPort}' onsubmit="javascript:saveit();" enctype='multipart/form-data'>
<div class="form-title"><h2>DTS</h2></div>
<table><tr><td>Message Number</td><td>My Call</td><td>My City</td><td>My State</td><td>Message Date</td></tr>
       <tr><td><input type="number" min=1 max=999 name="messageNumber" id="messageNumber" value='{var messageNumber}'  ></td>
        <td><input type='text' name='Callsign' id="Callsign" maxlength="15" value='{Callsign}' style="width: 10em;" 
                    style="text-transform: uppercase;" 
                    onblur="javascript:this.value=this.value.toUpperCase();"></td>
        <td><input type='text' name='myCity' id="myCity" placeholder="Origination City..." 
                    style="text-transform: uppercase;"
                    onblur="javascript:this.value=this.value.toUpperCase();"></td>
        <td><input type='text' name='myState' id="myState" 
                    style="width: 4em; text-transform: uppercase;"
                    onblur="javascript:this.value=this.value.toUpperCase();"></td>
        <td><input type="text" name="messageDate" id="messageDate" readonly="Y" value="{var messageDate}"  style="width: 8em;"></td>
    </tr>
</table>

<input type="text" hidden="true" name="sendto" id="sendto" >
<p><div class="form-title">Name:
<input type="text" name="name" id="name" style="text-transform: uppercase;" onblur="javascript:this.value=this.value.toUpperCase();">
Callsign:
<input name="call" id="call" style="text-transform: uppercase;" onblur="javascript:this.value=this.value.toUpperCase();"></div><p>
<p><div class="form-title">Address:
<input name="address" id="address" style="text-transform: uppercase;width:30em" onblur="javascript:this.value=this.value.toUpperCase();"></div><p>
<p><div class="form-title">City:
<input  type="text" name="city" id="city" style="text-transform: uppercase;" onblur="javascript:this.value=this.value.toUpperCase();">
State (2 char):
<input required="required" style="width: 3em;"  name="state" id="state" style="text-transform: uppercase;" onchange="updateDTNsendto();" onblur="javascript:this.value=this.value.toUpperCase();">
Zip Code:
<input required="required" style="width:6em;" type="text" name="zipcode" id="zipcode" onchange="updateDTNsendto();" onblur="this.value= this.value.toUpperCase();"></div></p>
<p><div class="form-title">E-Mail:
<input style="width: 40em" type="text" onchange="fixemail(this.value);" title= "Provide Email, phone number, or both. Without at least one delivery may not occur" 
        onblur="this.value= this.value.toUpperCase();" 
        name="email" id="email" ></div></p>
<p><div class="form-title">MESSAGE TEXT: 
    Check: 
    <input style="width: 7em;" name="check2" id="check2" size="10" maxlength="9" class="zentriert" readonly="readonly" value="0" type="text" />
    <input hidden="true" name="check" id="check" size="10" maxlength="9" class="zentriert" readonly="readonly" value="0" type="text" />
    &nbsp; <strong><span id="WarningText">&nbsp;</span></strong><br />
</div>
<textarea name="messageText" id="messageText" rows="7" cols="80" 
            style="text-transform: uppercase;" 
            placeholder="Enter your message here maximum of 25 words for DTN traffic ..."
            onkeyup="punctwrdcnt(this.value, this.id)" 
            onchange="this.value=RWS(this.value);fix();" 
            onblur="javascript:fixemail(this.value,this.id);this.value= this.value.toUpperCase();fix();"
            ></textarea>
        </textarea>
<p>
Signature (name) of person for whom message <span class="style1">originated</span>: &nbsp;&nbsp;
<textarea name="signature" id="signature" rows="2" cols="80"
        style="text-transform: uppercase;" 
        placeholder="Person who originated this message" 
        required="required"
        onblur="javascript:punctsignature(this.value,this.id); this.value=this.value.toUpperCase();"
        ></textarea>
</p>

</p>

<p>
<input type='submit' id='Submit' name='Submit' value='Submit' method='Post' enctype='multipart/form-data' />
</p>
<p>
<input type='submit' id="Cancel" name='Cancel' value='Cancel' method='Post' enctype='multipart/form-data' />
</p>
</form>
